  <script>
    // Get your shorts on - this is an array workout!
    // ## Array Cardio Day 1
    // Some data we can work with
    const inventors = [
      { first: 'Albert', last: 'Einstein', year: 1879, passed: 1955 },
      { first: 'Isaac', last: 'Newton', year: 1643, passed: 1727 },
      { first: 'Galileo', last: 'Galilei', year: 1564, passed: 1642 },
      { first: 'Marie', last: 'Curie', year: 1867, passed: 1934 },
      { first: 'Johannes', last: 'Kepler', year: 1571, passed: 1630 },
      { first: 'Nicolaus', last: 'Copernicus', year: 1473, passed: 1543 },
      { first: 'Max', last: 'Planck', year: 1858, passed: 1947 },
      { first: 'Katherine', last: 'Blodgett', year: 1898, passed: 1979 },
      { first: 'Ada', last: 'Lovelace', year: 1815, passed: 1852 },
      { first: 'Sarah E.', last: 'Goode', year: 1855, passed: 1905 },
      { first: 'Lise', last: 'Meitner', year: 1878, passed: 1968 },
      { first: 'Hanna', last: 'Hammarström', year: 1829, passed: 1909 }
    ];

    const people = [
      'Bernhard, Sandra', 'Bethea, Erin', 'Becker, Carl', 'Bentsen, Lloyd', 'Beckett, Samuel', 'Blake, William', 'Berger, Ric', 'Beddoes, Mick', 'Beethoven, Ludwig',
      'Belloc, Hilaire', 'Begin, Menachem', 'Bellow, Saul', 'Benchley, Robert', 'Blair, Robert', 'Benenson, Peter', 'Benjamin, Walter', 'Berlin, Irving',
      'Benn, Tony', 'Benson, Leana', 'Bent, Silas', 'Berle, Milton', 'Berry, Halle', 'Biko, Steve', 'Beck, Glenn', 'Bergman, Ingmar', 'Black, Elk', 'Berio, Luciano',
      'Berne, Eric', 'Berra, Yogi', 'Berry, Wendell', 'Bevan, Aneurin', 'Ben-Gurion, David', 'Bevel, Ken', 'Biden, Joseph', 'Bennington, Chester', 'Bierce, Ambrose',
      'Billings, Josh', 'Birrell, Augustine', 'Blair, Tony', 'Beecher, Henry', 'Biondo, Frank'
    ];

    // Array.prototype.filter()
    // 1. Filter the list of inventors for those who were born in the 1500's
		const fifteen = inventors.filter((inventor) => { // filter не изменяет массив, вместо этого он возвращает новый массив, содержащий только элементы, соответствующие критериям
    if(inventor.year >= 1800 && inventor.passed < 2000) {
        return inventor
    }
		})
		console.table(fifteen);


    // Array.prototype.map()
    // 2. Give us an array of the inventors first and last names
		const fullNames = inventors.map(inventor => `${inventor.first} ${inventor.last}`); // Метод map() создаёт новый массив с результатом вызова указанной функции для каждого элемента массива
    console.log(fullNames); // `${ Литералы шаблонов иногда неофициально называют строками шаблонов, но они не являются строковыми литералами и не могут использоваться везде, где можно использовать строковые литералы. Кроме того, помеченный литерал шаблона может не привести к строке; это зависит от функции тега, что она создает 

    // Array.prototype.sort()
    // 3. Sort the inventors by birthdate, oldest to youngest
		const ordered = inventors.sort((firstPerson, secondPerson) => { // Метод .sort() используется для сортировки элементов внутри массива. По умолчанию он сортирует значения как строки
    if(firstPerson.year > secondPerson.year){
        return 1
    }
    else{
        return -1 
    }
		})
		console.table(ordered)

    // Array.prototype.reduce()
    // 4. How many years did all the inventors live all together?
		const totalYears = inventors.reduce((total, inventor) => { // Метод reduce() выполняет функцию редуктора (которую вы предоставляете) для каждого элемента массива, в результате чего получается одно выходное значение.
      return total + (inventor.passed - inventor.year);
    }, 0); //  Безопасно будет присвоить начальное значение 0 функции сокращения, чтобы она всегда вызывала функцию вызова из индекса 0

    console.log(totalYears);

    // 5. Sort the inventors by years lived
		const age  = inventors.sort((firstPerson, secondPerson) => {
    const lastGuy = (firstPerson.passed - firstPerson.year)
    const nextGuy = (secondPerson.passed - secondPerson.year)

    if(lastGuy > nextGuy) {
        return 1
    }
    else {
        return -1
    }
		})
		console.table(age)

    // 6. create a list of Boulevards in Paris that contain 'de' anywhere in the name
    // https://en.wikipedia.org/wiki/Category:Boulevards_in_Paris
		//const category = document.querySelector('.mw-category')
		//const links = [...category.querySelectorAll('a')]
		//const de = links
    //             .map(link => link.textContent)
    //            .filter(streetName => streetName.includes('de'))

    // 7. sort Exercise
    // Sort the people alphabetically by last name
		const sorted = people.sort((lastOne, nextOne) => {
    const [aLast, aFirst] = lastOne.split(', ') // Мы передали внутрь функции 2 аргумента, т.е. lastOne и nextOne, разбили ее на две части с помощью .split()
    const [bLast, bFirst] = nextOne.split(', ')

    return aLast > bLast ? 1 : -1 // Условный ( тернарный) оператор является единственным оператором JavaScript, который принимает три операнда: условие, за которым следует вопросительный знак ( ?), затем выражение для выполнения, если условие истинно , за которым следует двоеточие ( :), и, наконец, выражение для выполнения, если условие ложное . Этот оператор часто используется в качестве альтернативы if...else оператору.
		})
		console.table(sorted)

    // 8. Reduce Exercise
    // Sum up the instances of each of these
    const data = ['car', 'car', 'truck', 'truck', 'bike', 'walk', 'car', 'van', 'bike', 'walk', 'car', 'van', 'car', 'truck' ];
		const transportation = data.reduce((obj, item) => { // // Метод reduce() выполняет функцию редуктора (которую вы предоставляете) для каждого элемента массива, в результате чего получается одно выходное значение.
    if(!obj[item]) {
        obj[item] = 0
    }
    obj[item] += 1
    return obj
		}, {})

		console.table(transportation)
  </script>
